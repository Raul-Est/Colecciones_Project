{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
    <h1>{{ title }}</h1>
    {% if suggestions %}
        <div class="suggestions">
            <p class="meta">Sugerencias rapidas (puedes editarlo despues):</p>
            <div class="suggestions__list">
                {% for s in suggestions %}
                    <button type="button" class="btn"
                                    onclick="document.getElementById('id_name').value='{{ s }}'">
                        {{ s }}
                    </button>
                {% endfor %}
            </div>
        </div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar</button>
        <a href="{% url 'collections:collection_detail' collection.slug %}">Cancelar</a>
    </form>
{% endblock %}
