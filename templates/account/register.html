{% extends "base.html" %}
{% block title %}Registro{% endblock %}
{% block content %}
    <h1>Crear cuenta</h1>
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Registrarse</button>
    </form>
    <p>¿Ya tienes cuenta? <a href="{% url 'users:login' %}">Entra aquí</a></p>
{% endblock %}
