{% extends "base.html" %}
{% block title %}Recuperar contraseña{% endblock %}
{% block content %}
    <h1>Recuperar contraseña</h1>
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Enviar enlace</button>
    </form>
    <p>¿Ya tienes cuenta? <a href="{% url 'users:login' %}">Entrar</a></p>
{% endblock %}
